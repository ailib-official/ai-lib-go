name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - "feat/**"
      - "fix/**"
      - "chore/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Go lint and test
    runs-on: ubuntu-latest
    env:
      AI_PROTOCOL_DIR: ${{ github.workspace }}/ai-protocol
      COMPLIANCE_DIR: ${{ github.workspace }}/ai-protocol/tests/compliance
    steps:
      - name: Check out ai-lib-go
        uses: actions/checkout@v4

      - name: Check out ai-protocol compliance fixtures
        uses: actions/checkout@v4
        with:
          repository: ailib-official/ai-protocol
          ref: v1.0.0
          path: ai-protocol

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Check formatting
        run: |
          files="$(gofmt -l .)"
          if [ -n "$files" ]; then
            echo "$files"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

  test-with-mock:
    name: Test with ai-protocol-mock
    runs-on: ubuntu-latest
    env:
      AI_PROTOCOL_REF: v1.0.0
      MOCK_HTTP_URL: http://localhost:4010
      NO_PROXY: localhost,127.0.0.1
    steps:
      - name: Check out ai-lib-go
        uses: actions/checkout@v4

      - name: Check out ai-protocol
        uses: actions/checkout@v4
        with:
          repository: ailib-official/ai-protocol
          ref: v1.0.0
          path: ai-protocol

      - name: Check out ai-protocol-mock
        uses: actions/checkout@v4
        with:
          repository: ailib-official/ai-protocol-mock
          path: ai-protocol-mock

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Start mock server
        run: |
          cd ai-protocol-mock
          pip install -e .
          python scripts/sync_manifests.py --force --tag v1.0.0 || true
          uvicorn ai_protocol_mock.main:app --host 0.0.0.0 --port 4010 &
          sleep 5

      - name: Run mock integration tests
        env:
          AI_PROTOCOL_DIR: ${{ github.workspace }}/ai-protocol
          COMPLIANCE_DIR: ${{ github.workspace }}/ai-protocol/tests/compliance
        run: go test -v ./tests/integration/...
