# PT-073 (Wave-5): Go execution-layer compliance + E/P boundary evidence.
# Go runtime is core-only; full matrix via tests/compliance (no separate e_only subset).

name: PT-073 Go (compliance)

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  compliance:
    name: Go compliance + vet
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: ai-lib-go

    steps:
      - name: Checkout ai-lib-go
        uses: actions/checkout@v4
        with:
          path: ai-lib-go

      - name: Checkout ai-protocol
        uses: actions/checkout@v4
        with:
          repository: ailib-official/ai-protocol
          ref: main
          path: ai-protocol

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache-dependency-path: ai-lib-go/go.sum

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: E/P boundary — Go (protocol/stream)
        run: |
          python "${{ github.workspace }}/ai-protocol/tests/compliance/ep-boundary/check_ep_boundary.py" \
            --go-root "${{ github.workspace }}/ai-lib-go"

      - name: ExecutionMetadata samples — schema validation
        run: |
          pip install fastjsonschema
          python "${{ github.workspace }}/ai-protocol/tests/compliance/ep-boundary/validate_execution_metadata_samples.py" \
            --protocol-root "${{ github.workspace }}/ai-protocol"

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Contact layer — compile smoke
        run: go test ./pkg/contact/... -run=^$

      - name: Compliance tests
        env:
          AI_PROTOCOL_DIR: ${{ github.workspace }}/ai-protocol
          COMPLIANCE_DIR: ${{ github.workspace }}/ai-protocol/tests/compliance
        run: go test ./...
