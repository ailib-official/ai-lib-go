# Create a GitHub Release when a version tag v* is pushed.
# Uses the workflow GITHUB_TOKEN only (contents: write). Do not commit PATs; add machine users via repo/org settings if needed.
#
# Go modules are consumed via this repo + tag (proxy.golang.org); the Release page is the human-facing changelog + artifacts hook.

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  verify-and-release:
    runs-on: ubuntu-latest
    env:
      AI_PROTOCOL_DIR: ${{ github.workspace }}/ai-protocol
      COMPLIANCE_DIR: ${{ github.workspace }}/ai-protocol/tests/compliance
    steps:
      - name: Check out ai-lib-go
        uses: actions/checkout@v4

      - name: Check out ai-protocol (compliance fixtures)
        uses: actions/checkout@v4
        with:
          repository: ailib-official/ai-protocol
          path: ai-protocol

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Check formatting
        run: |
          files="$(gofmt -l .)"
          if [ -n "$files" ]; then
            echo "$files"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
